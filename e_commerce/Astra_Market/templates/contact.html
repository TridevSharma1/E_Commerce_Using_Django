{% extends 'base.html' %}

{% block title %}Contact - Astra Market{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-3">Contact Us</h2>
                <p class="text-muted mb-4">Need help? Send us a message and our support team will get back to you within 24 hours.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="row gy-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Your name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="you@example.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Subject</label>
                            <input type="text" name="subject" class="form-control" placeholder="Subject">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Message</label>
                            <textarea name="message" class="form-control" rows="5" placeholder="Write your message here..."></textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button class="btn btn-primary px-4" type="submit">Send Message</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
